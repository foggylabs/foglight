  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    body {

      color: #B3DDFF;

    #particles-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .container {
      text-align: center;
      z-index: 1;
      padding: 2rem;
      animation: fade-in 1.2s ease-out both;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      border-radius: 18px;
      animation: glow 4s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(0, 136, 255, 0.3)); }
      50% { filter: drop-shadow(0 0 24px rgba(0, 136, 255, 0.7)); }
    }

    h1 {

      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .tagline {

      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #55AAFF;
      margin-bottom: 2rem;
    }

    .description {
      font-size: 1.125rem;
      line-height: 1.7;
      color: rgba(179, 221, 255, 0.7);
      max-width: 440px;
      margin: 0 auto 2.5rem;
    }

    /* Shimmer button — ported from Magic UI shimmer-button.tsx */
    .shimmer-btn {
      --shimmer-color: #0088FF;
      --bg: rgba(0, 0, 0, 1);
      --radius: 8px;
      --speed: 3s;
      --spread: 90deg;
      --cut: 0.05em;
      position: relative;
      z-index: 0;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #ffffff;
      text-decoration: none;
      font-size: 0.9375rem;
      font-weight: 500;
      background: var(--bg);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .btn-group {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .shimmer-btn:active { transform: translateY(1px); }
    .shimmer-btn svg { width: 18px; height: 18px; fill: currentColor; }

    .shimmer-btn::before {
      content: '';
      position: absolute;
      inset: -100%;
      z-index: -3;
      background: conic-gradient(
        from calc(270deg - (var(--spread) * 0.5)),
        transparent 0, var(--shimmer-color) var(--spread), transparent var(--spread)
      );
      animation: spin-around var(--speed) linear infinite;
      filter: blur(2px);
    }

    .shimmer-btn::after {
      content: '';
      position: absolute;
      inset: var(--cut);
      z-index: -2;
      border-radius: var(--radius);
      background: var(--bg);
    }

    .shimmer-btn .highlight {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      box-shadow: inset 0 -8px 10px rgba(255, 255, 255, 0.06);
      transition: box-shadow 0.3s ease;
      pointer-events: none;
    }
    .shimmer-btn:hover .highlight {
      box-shadow: inset 0 -6px 10px rgba(255, 255, 255, 0.12);
    }

    @keyframes spin-around {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.75rem; }
      .description { font-size: 1rem; }
      .logo { width: 64px; height: 64px; }
    }
  </style>

  <!-- Particles effect — ported from Magic UI particles.tsx -->
  <script>
    (function () {
      const canvas = document.getElementById('particles-canvas');
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;

      const QUANTITY = 80;
      const COLOR = [0, 136, 255]; // #0088FF
      const SIZE = 0.4;
      const STATICITY = 50;
      const EASE = 50;

      let w = 0, h = 0;
      let circles = [];
      let mouse = { x: 0, y: 0 };
      let rafId = null;
      let resizeTimer = null;

      function resize() {
        w = window.innerWidth;
        h = window.innerHeight;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.scale(dpr, dpr);
        circles = [];
        for (let i = 0; i < QUANTITY; i++) {
          circles.push(createCircle());
        }
      }

      function createCircle() {
        return {
          x: Math.floor(Math.random() * w),
          y: Math.floor(Math.random() * h),
          translateX: 0,
          translateY: 0,
          size: Math.floor(Math.random() * 2) + SIZE,
          alpha: 0,
          targetAlpha: parseFloat((Math.random() * 0.6 + 0.1).toFixed(1)),
          dx: (Math.random() - 0.5) * 0.1,
          dy: (Math.random() - 0.5) * 0.1,
          magnetism: 0.1 + Math.random() * 4,
        };
      }

      function drawCircle(c) {
        ctx.translate(c.translateX, c.translateY);
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.size, 0, 2 * Math.PI);
        ctx.fillStyle = `rgba(${COLOR[0]}, ${COLOR[1]}, ${COLOR[2]}, ${c.alpha})`;
        ctx.fill();
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function remap(value, low1, high1, low2, high2) {
        let r = ((value - low1) * (high2 - low2)) / (high1 - low1) + low2;
        return r > 0 ? r : 0;
      }

      function animate() {
        ctx.clearRect(0, 0, w, h);
        for (let i = circles.length - 1; i >= 0; i--) {
          let c = circles[i];

          // Edge fade
          let edges = [
            c.x + c.translateX - c.size,
            w - c.x - c.translateX - c.size,
            c.y + c.translateY - c.size,
            h - c.y - c.translateY - c.size,
          ];
          let closest = Math.min(...edges);
          let remapped = parseFloat(remap(closest, 0, 20, 0, 1).toFixed(2));
          if (remapped > 1) {
            c.alpha += 0.02;
            if (c.alpha > c.targetAlpha) c.alpha = c.targetAlpha;
          } else {
            c.alpha = c.targetAlpha * remapped;
          }

          c.x += c.dx;
          c.y += c.dy;

          // Mouse magnetism
          c.translateX += (mouse.x / (STATICITY / c.magnetism) - c.translateX) / EASE;
          c.translateY += (mouse.y / (STATICITY / c.magnetism) - c.translateY) / EASE;

          drawCircle(c);

          // Out of bounds — recycle
          if (c.x < -c.size || c.x > w + c.size || c.y < -c.size || c.y > h + c.size) {
            circles.splice(i, 1);
            circles.push(createCircle());
          }
        }
        rafId = requestAnimationFrame(animate);
      }

      window.addEventListener('mousemove', function (e) {
        mouse.x = e.clientX - w / 2;
        mouse.y = e.clientY - h / 2;
      });

      window.addEventListener('resize', function () {
        if (resizeTimer) clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function () {
          ctx.setTransform(1, 0, 0, 1, 0, 0);
          resize();
        }, 200);
      });

      resize();
      animate();
    })();
  </script>
